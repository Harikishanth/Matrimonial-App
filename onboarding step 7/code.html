<!-- Interactive Search Simulation Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.querySelector('input[placeholder*="Search occupation"]');
            const listItems = document.querySelectorAll('.custom-scrollbar div');

            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                listItems.forEach(item => {
                    const text = item.textContent.toLowerCase();
                    if (text.includes(term)) {
                        item.classList.remove('hidden');
                    } else {
                        item.classList.add('hidden');
                    }
                });
            });

            listItems.forEach(item => {
                item.addEventListener('click', () => {
                    searchInput.value = item.textContent.split(' (')[0];
                    listItems.forEach(li => li.classList.remove('bg-primary-fixed', 'text-primary'));
                    item.classList.add('bg-primary-fixed', 'text-primary');
                });
            });
        });
    </script>
