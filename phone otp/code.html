<script>
        // OTP Input Focus Logic
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 1) {
                    e.target.value = e.target.value.slice(0, 1);
                }
                if (e.target.value !== '' && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Simple Timer Logic
        let timeLeft = 59;
        const timerDisplay = document.getElementById('timer');
        const countdown = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerDisplay.parentElement.innerHTML = '<button type="button" class="text-primary font-bold hover:underline cursor-pointer">Resend OTP Now</button>';
            } else {
                timerDisplay.textContent = `0:${timeLeft < 10 ? '0' : ''}${timeLeft}`;
                timeLeft--;
            }
        }, 1000);

        // Form Submit Interaction
        document.getElementById('otp-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const otp = Array.from(inputs).map(i => i.value).join('');
            if (otp.length === 6) {
                const btn = e.target.querySelector('button[type="submit"]');
                btn.innerHTML = '<span class="flex items-center justify-center gap-2">Verifying... <div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div></span>';
                btn.disabled = true;
                // Simulated success
                setTimeout(() => {
                    btn.innerHTML = 'Success!';
                    btn.classList.replace('bg-primary-container', 'bg-green-700');
                }, 1500);
            }
        });
    </script>
