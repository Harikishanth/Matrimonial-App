        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        .bg-zoom-subtle {
            animation: subtleZoom 30s infinite ease-in-out;
        }

<body class="bg-background text-on-background font-body-md antialiased selection:bg-primary selection:text-on-primary h-screen w-full overflow-hidden">
<!-- Splash Screen Layout (Transactional/Linear flow: NavBars suppressed) -->
<main class="relative h-full w-full flex flex-col justify-between items-center">
<!-- Hero Background Layer -->
<div class="absolute inset-0 z-0 overflow-hidden bg-surface-container-highest">
<div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1542157585-ef20fbce81e6?ixlib=rb-4.0.3&amp;auto=format&amp;fit=crop&amp;w=2000&amp;q=80')] bg-cover bg-center bg-no-repeat opacity-40 mix-blend-multiply bg-zoom-subtle" data-alt="A cinematic, highly detailed photograph of a traditional South Indian temple interior corridor. Rows of intricately carved stone pillars lead the eye towards a soft, warm light source. Delicate brass oil lamps (kuthu vilakku) cast a warm golden hour glow, creating long elegant shadows. The color palette emphasizes rich temple maroon tones intersecting with soft ivory and antique gold accents. The atmosphere is serene, deeply spiritual, and exceptionally regal, embodying heritage and institutional trust in a modern light-mode context.">
</div>
<!-- Vignette and text protection gradient -->
<div class="absolute inset-0 bg-gradient-to-t from-background via-background/70 to-background/20"></div>
<div class="absolute inset-0 bg-gradient-to-b from-background/40 to-transparent"></div>
</div>
<!-- Content Canvas -->
<div class="relative z-10 w-full max-w-container-max mx-auto h-full flex flex-col px-margin-mobile md:px-margin-desktop py-stack-lg">
<!-- Top Spacing -->
<div class="flex-shrink-0 h-12 md:h-24"></div>
<!-- Central Branding Area -->
<div class="flex-1 flex flex-col items-center justify-center text-center">
<!-- Heritage Motif / Trust Seal representation -->
<div class="mb-stack-lg relative w-24 h-24 md:w-32 md:h-32 rounded-full border-2 border-secondary/30 flex items-center justify-center bg-surface/50 backdrop-blur-sm shadow-sm">
<div class="absolute inset-2 border border-secondary/20 rounded-full"></div>
<span class="material-symbols-outlined text-5xl md:text-6xl text-primary drop-shadow-sm">
                        temple_hindu
                    </span>
</div>
<!-- Brand Typography -->
<h1 class="font-display-lg text-display-lg text-primary tracking-tight mb-stack-sm drop-shadow-sm">KALYATHIRU</h1>
<!-- Tagline -->
<h2 class="font-headline-md text-headline-md text-on-surface max-w-sm md:max-w-md">
                    நிச்சயிக்கப்பட்ட நம்பிக்கையின் சங்கமம்
                </h2>
<!-- Divider element -->
<div class="mt-stack-lg flex items-center justify-center space-x-2">
<div class="h-px w-8 bg-outline/40"></div>
<div class="w-2 h-2 rounded-full bg-secondary"></div>
<div class="h-px w-8 bg-outline/40"></div>
</div>
</div>
<!-- Bottom CTA Area -->
<div class="w-full flex justify-center pb-8 md:pb-16 pt-8">
<div class="w-full max-w-[400px] flex flex-col gap-stack-md">
<!-- Primary CTA -->
<button class="group w-full relative overflow-hidden bg-primary text-on-primary py-4 px-6 rounded-lg font-label-lg text-label-lg uppercase tracking-wider text-center transition-all duration-300 hover:bg-primary-container active:scale-[0.98] shadow-[0_4px_14px_0_rgba(87,0,19,0.25)] flex items-center justify-center gap-2">
<span class="relative z-10">Register / பதிவு செய்யுங்கள்</span>
<span class="material-symbols-outlined text-[18px] relative z-10 transform group-hover:translate-x-1 transition-transform">
                            arrow_right_alt
                        </span>
<!-- Subtle hover overlay -->
<div class="absolute inset-0 bg-white/0 group-hover:bg-white/10 transition-colors z-0"></div>
</button>
<!-- Secondary CTA -->
<button class="w-full bg-surface text-on-surface py-4 px-6 rounded-lg font-label-lg text-label-lg text-center transition-all duration-300 border border-outline/30 hover:border-outline hover:bg-surface-container-low active:scale-[0.98] flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px] text-on-surface-variant">
                            login
                        </span>
                        Already have an account? Login / உள்நுழைக
                    </button>
</div>
</div>
</div>
